name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Electron (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Supply-chain audit
        run: pnpm security:audit

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint:check

      - name: Typecheck
        run: pnpm typecheck:all

      - name: Backend tests
        run: pnpm --filter ./backend test -- --runInBand

      - name: Frontend tests
        run: pnpm --filter ./frontend test -- --runInBand --watchAll=false

      - name: Generate SBOM
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          pnpm dlx @cyclonedx/cyclonedx-npm --output-file release/sbom.cdx.json

      - name: Build all
        run: pnpm build:all
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3001/api
          NEXT_PUBLIC_ENABLE_LOCAL_MOCKS: 'false'

      - name: Build installer
        run: pnpm dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_RELEASE: 'true'
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Smoke packaged app
        shell: pwsh
        run: |
          $app = Get-ChildItem -Path release\win-unpacked -Filter *.exe | Select-Object -First 1
          if (-not $app) { throw "win-unpacked .exe nao encontrado" }
          $proc = Start-Process -FilePath $app.FullName -PassThru -WindowStyle Hidden
          try {
            $ready = $false
            for ($i = 0; $i -lt 60; $i++) {
              try {
                $res = Invoke-WebRequest -Uri "http://127.0.0.1:3001/api/health" -UseBasicParsing -TimeoutSec 2
                if ($res.StatusCode -eq 200) {
                  $ready = $true
                  break
                }
              } catch {
                Start-Sleep -Seconds 1
              }
            }
            if (-not $ready) { throw "App empacotado nao respondeu /api/health" }
          } finally {
            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Verify Authenticode signature
        shell: pwsh
        run: |
          $files = Get-ChildItem release -Filter *.exe
          if (-not $files) { throw "Nenhum instalador .exe gerado" }
          foreach ($file in $files) {
            $sig = Get-AuthenticodeSignature -LiteralPath $file.FullName
            if ($sig.Status -ne 'Valid') {
              throw "Assinatura invalida em $($file.Name): $($sig.Status)"
            }
            Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName |
              ForEach-Object { "$($_.Hash)  $($file.Name)" } |
              Out-File -Append -Encoding ascii release/SHA256SUMS.txt
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solution-ticket-windows
          path: release/*.exe
          retention-days: 30

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.yml
            release/*.blockmap
            release/SHA256SUMS.txt
            release/sbom.cdx.json
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
