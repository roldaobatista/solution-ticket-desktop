name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JWT_SECRET: ci-test-secret-RNNJyUCiovb55Escn1BfIZWCVkxLLJNybMzgu9zOxhBak3JTV2t
  SEED_DEFAULT_PASSWORD: CiTestPass!2026
  NODE_ENV: test
  DATABASE_URL: file:./test.db

jobs:
  ci:
    name: Lint, Typecheck, Test, Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint:check

      - name: Typecheck (backend + frontend)
        run: pnpm typecheck:all

      - name: Audit (production)
        run: pnpm audit --prod --audit-level high
        continue-on-error: true

      # RD4: gate de seed — falha CI se schema atual nao for compativel com seed.
      - name: Seed sanity check
        run: pnpm --filter ./backend db:seed
        env:
          DATABASE_URL: file:./ci-seed-test.db

      - name: Test (unit)
        run: pnpm --filter ./backend test

      - name: Test (e2e)
        run: pnpm --filter ./backend test:e2e

      - name: Build backend
        run: pnpm build:backend

      - name: Build frontend
        run: pnpm build:frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3001/api
          NEXT_PUBLIC_USE_MOCK: 'false'

      # RQ1: Playwright e2e (smoke). Browsers cached entre runs.
      - name: Install Playwright browsers
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter ./frontend exec playwright install --with-deps chromium
      - name: Playwright smoke
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter ./frontend test:e2e
        env:
          NEXT_PUBLIC_USE_MOCK: 'true'
        continue-on-error: true
