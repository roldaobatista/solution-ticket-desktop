name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JWT_SECRET: ci-test-secret-RNNJyUCiovb55Escn1BfIZWCVkxLLJNybMzgu9zOxhBak3JTV2t
  SEED_DEFAULT_PASSWORD: CiTestPass!2026
  NODE_ENV: test
  DATABASE_URL: file:./test.db

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint:check

  secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm security:audit:prod

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck:all

  seed:
    name: Seed Sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter ./backend db:seed
        env:
          DATABASE_URL: file:./ci-seed-test.db

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter ./backend test:cov -- --runInBand
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  test-e2e-backend:
    name: Backend E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter ./backend test:e2e
      - run: pnpm --filter ./backend smoke:balanca

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm build:backend
      - run: pnpm build:frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3001/api
          NEXT_PUBLIC_ENABLE_LOCAL_MOCKS: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            backend/dist/
            frontend/.next/

  test-e2e-frontend:
    name: Frontend E2E (Playwright — mock)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: build-outputs
      - run: pnpm --filter ./frontend build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3001/api
          NEXT_PUBLIC_ENABLE_LOCAL_MOCKS: 'true'
          NEXT_PUBLIC_LOCAL_MOCK_PASSWORD: ${{ env.SEED_DEFAULT_PASSWORD }}
      - run: pnpm --filter ./frontend exec playwright install --with-deps chromium
      - run: pnpm --filter ./frontend test:e2e
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3001/api
          NEXT_PUBLIC_ENABLE_LOCAL_MOCKS: 'true'
          NEXT_PUBLIC_LOCAL_MOCK_PASSWORD: ${{ env.SEED_DEFAULT_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-mock
          path: frontend/playwright-report/

  test-e2e-frontend-real:
    name: Frontend E2E (Playwright — backend real)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: build-outputs
      - run: pnpm db:generate
      - run: pnpm --filter ./backend db:migrate:prod
        env:
          DATABASE_URL: file:./e2e-test.db
      - run: pnpm --filter ./backend db:seed
        env:
          DATABASE_URL: file:./e2e-test.db
      - run: |
          pnpm --filter ./backend start:prod &
          PID=$!
          echo "Backend PID: $PID"
          READY=0
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:3001/api/health > /dev/null; then
              echo "Backend is ready"
              READY=1
              break
            fi
            sleep 1
          done
          if [ "$READY" != "1" ]; then
            echo "Backend did not become healthy"
            exit 1
          fi
        env:
          DATABASE_URL: file:./e2e-test.db
          PORT: 3001
          JWT_SECRET: ${{ env.JWT_SECRET }}
          SEED_DEFAULT_PASSWORD: ${{ env.SEED_DEFAULT_PASSWORD }}
          NODE_ENV: test
      - run: pnpm --filter ./frontend exec playwright install --with-deps chromium
      - run: pnpm --filter ./frontend test:e2e
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:3001/api
          NEXT_PUBLIC_ENABLE_LOCAL_MOCKS: 'false'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-real
          path: frontend/playwright-report/
