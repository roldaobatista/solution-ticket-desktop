    function exportToCSV(filename, headers, rows) {
      const csv = [headers.join(';'), ...rows.map(r => r.join(';'))].join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }

      const diasPercent = Math.round((licenca.diasRestantes / 15) * 100);

              React.createElement(Badge, { status: licenca.status, text: licenca.status }),
              React.createElement('p', { className: 'text-2xl font-bold text-slate-900 mt-1' }, `${licenca.diasRestantes} dias restantes`)

              )
            ),
            React.createElement('div', null,
              React.createElement('div', { className: 'flex justify-between text-sm mb-2' },
                React.createElement('span', { className: 'text-slate-600' }, 'Pesagens Restantes'), React.createElement('span', { className: 'font-semibold' }, `${licenca.pesagensRestantes}/${licenca.totalPesagensTrial}`)
              ),
              React.createElement('div', { className: 'w-full bg-slate-100 rounded-full h-3' },
                React.createElement('div', { className: 'bg-primary-500 h-3 rounded-full transition-all', style: { width: `${pesagemPercent}%` } })

          )
        ),
        React.createElement('div', { className: 'bg-white rounded-xl border border-slate-100 p-6' },
          React.createElement('h3', { className: 'font-semibold text-slate-800 mb-3' }, 'Ativar Licença'),

            React.createElement('input', { type: 'text', placeholder: 'Cole a chave de licenciamento...', value: chaveInput, onChange: e => setChaveInput(e.target.value), className: 'flex-1 px-4 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500' }),

          React.createElement('div', { className: 'grid grid-cols-5 gap-3' },

    // ============================================================
    // MAIN APP
    // ============================================================

      const { user, activePage } = useStore();

      if (!user) return React.createElement(LoginPage);

      const pageMap = {
        dashboard: DashboardPage,
        pesagem: PesagemPage,
        tickets: TicketsPage,
        ticketDetail: TicketDetailPage,
        cadastros: () => React.createElement(CrudPage, { title: 'Clientes', data: MOCK_DATA.clientes, columns: [{ key: 'razaoSocial', label: 'Razão Social' }, { key: 'documento', label: 'Documento' }, { key: 'cidade', label: 'Cidade' }, { key: 'uf', label: 'UF' }, { key: 'status', label: 'Status', render: v => React.createElement(Badge, { status: v === 'ATIVO' ? 'FECHADO' : 'CANCELADO', text: v }) }], searchFields: ['razaoSocial', 'documento', 'cidade'] }),
        transportadoras: () => React.createElement(CrudPage, { title: 'Transportadoras', data: MOCK_DATA.transportadoras, columns: [{ key: 'razaoSocial', label: 'Razão Social' }, { key: 'documento', label: 'Documento' }], searchFields: ['razaoSocial'] }),
        motoristas: () => React.createElement(CrudPage, { title: 'Motoristas', data: MOCK_DATA.motoristas, columns: [{ key: 'nome', label: 'Nome' }, { key: 'documento', label: 'Documento' }, { key: 'cnh', label: 'CNH' }, { key: 'telefone', label: 'Telefone' }], searchFields: ['nome', 'documento', 'cnh'] }),
        produtos: () => React.createElement(CrudPage, { title: 'Produtos', data: MOCK_DATA.produtos, columns: [{ key: 'nome', label: 'Nome' }, { key: 'unidade', label: 'Unidade' }, { key: 'tipoOperacao', label: 'Tipo' }], searchFields: ['nome'] }),
        veiculos: () => React.createElement(CrudPage, { title: 'Veículos', data: MOCK_DATA.veiculos, columns: [{ key: 'placa', label: 'Placa' }, { key: 'modelo', label: 'Modelo' }, { key: 'taraCadastrada', label: 'Tara (kg)', align: 'right', render: v => fmt.weight(v) }], searchFields: ['placa', 'modelo'] }),
        balancas: () => React.createElement(CrudPage, { title: 'Balanças', data: MOCK_DATA.balancas, columns: [{ key: 'nome', label: 'Nome' }, { key: 'serial', label: 'Serial' }, { key: 'protocolo', label: 'Protocolo' }, { key: 'porta', label: 'Porta', align: 'right' }, { key: 'status', label: 'Status', render: v => React.createElement(Badge, { status: v, text: v }) }], searchFields: ['nome', 'serial'] }),

      return React.createElement('div', { className: 'h-screen flex' },
        React.createElement(Sidebar),

          React.createElement(Header),
          React.createElement('main', { className: 'flex-1 overflow-y-auto bg-slate-50' }, React.createElement(PageComponent))

    // ============================================================
