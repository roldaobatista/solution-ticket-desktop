<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Solution Ticket</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh;
      background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
      color: white;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      user-select: none; -webkit-app-region: drag;
    }
    h1 { font-size: 32px; font-weight: 700; letter-spacing: 0.5px; }
    p  { font-size: 14px; opacity: 0.85; margin-top: 8px; }
    .spinner {
      margin-top: 32px;
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { margin-top: 24px; font-size: 12px; opacity: 0.7; }
  </style>
</head>
<body>
  <h1>Solution Ticket</h1>
  <p>Sistema de Pesagem Veicular</p>
  <div class="spinner"></div>
  <div class="status">Iniciando serviços locais...</div>
</body>
</html>
